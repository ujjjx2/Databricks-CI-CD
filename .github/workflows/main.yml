name: Databricks CI/CD with Asset Bundles

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flake8 pytest

      - name: Lint code
        run: |
          flake8 notebooks/ --max-line-length=120

      - name: Run tests
        run: |
          pytest || echo "No tests found"

  deploy:
    name: Deploy Databricks Bundle
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Install modern Databricks CLI
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      # ✅ Set authentication (NO login command)
      - name: Set environment variables
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_TOKEN=${{ secrets.DATABRICKS_TOKEN }}" >> $GITHUB_ENV

      # ✅ Validate bundle config
      - name: Validate bundle
        run: databricks bundle validate

      # ✅ Deploy to Databricks
      - name: Deploy bundle
        run: databricks bundle deploy --target dev
