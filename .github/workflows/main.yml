name: Databricks CI/CD Pipeline (DAB)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install flake8 pytest

      - name: Lint code
        run: flake8 notebooks/ --max-line-length=120

      - name: Run tests
        run: pytest || echo "No tests found"

  cd:
    name: Deploy with Databricks Asset Bundles
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ CORRECT: Install new CLI
      - name: Install Databricks CLI (new)
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Configure Databricks Auth
        run: |
          databricks auth login --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      # ✅ Validate bundle
      - name: Validate bundle
        run: databricks bundle validate

      # ✅ Deploy bundle
      - name: Deploy bundle
        run: databricks bundle deploy --target prod
